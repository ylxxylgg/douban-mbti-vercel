<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>豆瓣 MBTI · AI 人格分析</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#080c14;color:#e2e8f0;min-height:100vh}
.c{max-width:580px;margin:0 auto;padding:50px 20px 80px}
.header{text-align:center;margin-bottom:48px}
.t{font-size:52px;font-weight:900;color:#60a5fa;margin-bottom:10px;letter-spacing:-2px}
.sub{font-size:18px;margin-bottom:6px}
.tagline{font-size:14px;color:rgba(255,255,255,.35)}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);border-radius:22px;padding:28px 30px;margin-bottom:16px}
.label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:12px;display:block}
input{width:100%;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:14px 16px;font-size:15px;color:#e2e8f0;outline:none;box-sizing:border-box;font-family:inherit;transition:border-color .2s}
input:focus{border-color:#60a5fa;box-shadow:0 0 0 3px rgba(96,165,250,.12)}
input::placeholder{color:rgba(255,255,255,.22)}
.hint{font-size:11px;color:rgba(255,255,255,.25);margin-top:8px;line-height:1.6}
.btn{width:100%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;border-radius:12px;padding:17px;font-size:16px;font-weight:700;color:#fff;cursor:pointer;margin-top:16px;font-family:inherit;transition:opacity .2s}
.btn:hover:not(:disabled){opacity:.88}.btn:disabled{opacity:.45;cursor:not-allowed}
.msg{padding:15px 18px;border-radius:12px;margin-top:18px;font-size:14px;line-height:1.7;min-height:52px}
.ok{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.28);color:#34d399}
.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.28);color:#ef4444}
.info{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.25);color:#60a5fa}
.loader{border:2px solid rgba(96,165,250,.3);border-top-color:#60a5fa;border-radius:50%;width:18px;height:18px;animation:spin .8s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:40px 0 20px;color:rgba(255,255,255,.1);font-size:11px;line-height:1.8}
.divider{height:1px;background:rgba(255,255,255,.05);margin:32px 0}
.report{margin-top:24px}
.rtitle{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#60a5fa;margin-bottom:16px}
.rtype{font-size:80px;font-weight:900;color:#60a5fa;letter-spacing:-3px;line-height:1;margin-bottom:6px}
.rname{font-size:20px;font-weight:600;color:#60a5fa;margin-bottom:4px}
.rdesc{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:24px}
.rd{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px 22px;margin-bottom:12px}
.rd-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:8px}
.rd p{font-size:13.5px;line-height:1.8;color:rgba(226,232,240,.78)}
</style>
</head>
<body>
<div class="c">
<div class="header">
<div class="t">🎯 豆瓣 MBTI</div>
<div class="sub">📖 &nbsp;🎬 &nbsp;🎵</div>
<div class="tagline">输入豆瓣主页链接，AI 分析你的书影音人格</div>
</div>
<div class="card">
<label class="label">豆瓣主页链接</label>
<input type="text" id="doubanUrl" placeholder="https://www.douban.com/people/135867223/" onkeydown="if(event.key==='Enter')document.getElementById('btn').click()"/>
<div class="hint">支持任意豆瓣用户主页链接</div>
</div>
<div class="card">
<label class="label">MiniMax API Key</label>
<input type="password" id="apiKey" placeholder="platform.minimax.chat 免费获取，仅在浏览器本地使用" onkeydown="if(event.key==='Enter')document.getElementById('btn').click()"/>
<div class="hint">API Key 仅在本地使用，不会发送至第三方</div>
</div>
<button class="btn" id="btn" onclick="run()">🚀 开始 MBTI 分析</button>
<div id="msg"></div>
<div id="report"></div>
<div class="divider"></div>
</div>
<div class="footer">豆瓣 MBTI · 基于 MiniMax M2.7 · 仅供参考娱乐</div>
</div>
<script>
var MBTI_DATA={INTJ:{name:'建筑师',desc:'富有想象力和战略性的思想家'},INTP:{name:'逻辑学家',desc:'创新思想家'},ENTJ:{name:'指挥官',desc:'大胆的领导者'},ENTP:{name:'辩论家',desc:'聪明好奇'},INFJ:{name:'提倡者',desc:'安静而神秘'},INFP:{name:'调停者',desc:'诗意善良的灵魂'},ENFJ:{name:'主人公',desc:'富有魅力和灵感'},ENFP:{name:'竞选者',desc:'热情洋溢'},ISTJ:{name:'物流师',desc:'务实且注重事实'},ISFJ:{name:'守护者',desc:'温暖而关心他人'},ESTJ:{name:'总经理',desc:'卓越执行者'},ESFJ:{name:'供给者',desc:'热情周到'},ISTP:{name:'鉴赏家',desc:'大胆而实用'},ISFP:{name:'探险家',desc:'灵活有魅力'},ESTP:{name:'企业家',desc:'精力充沛'},ESFP:{name:'表演者',desc:'自发性魅力热情'}};
var loading=false;
function show(t,type){
  var m=document.getElementById('msg');
  m.className='msg '+(type||'');
  m.innerHTML=(loading?'<span class="loader"></span>':'')+t;
}
function setBtn(t){
  var b=document.getElementById('btn');
  b.disabled=!!t;
  b.textContent=t||'🚀 开始 MBTI 分析';
}
async function run(){
  if(loading)return;
  var url=document.getElementById('doubanUrl').value.trim();
  var key=document.getElementById('apiKey').value.trim();
  if(!url){show('请输入豆瓣链接或用户 ID','err');return;}
  if(!key){show('请输入 MiniMax API Key（免费获取：platform.minimax.chat）','err');return;}
  loading=true;setBtn('分析中...');show('正在连接服务...','info');
  try{
    var r=await fetch('/api/index',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:url,apiKey:key})});
    var txt=await r.text();
    var d;
    try{d=JSON.parse(txt);}catch(e){throw new Error('服务器响应格式错误: '+r.status+' '+txt.slice(0,100));}
    if(d.error){show('错误：'+d.error,'err');setBtn(false);loading=false;return;}
    var info=MBTI_DATA[d.type]||{name:'待分析',desc:'分析中'};
    var s=function(label,content){return content?'<div class="rd"><div class="rd-label">'+label+'</div><p>'+content+'</p></div>':'';};
    document.getElementById('report').innerHTML='<div class="report"><div class="rtitle">MBTI 人格分析报告</div><div class="rtype">'+d.type+'</div><div class="rname">'+info.name+'人格</div><div class="rdesc">'+info.desc+'</div>'+s('深度人格画像',d.data.portrait)+s('认知风格解析',d.data.cognitiveStyle)+s('情感世界解读',d.data.emotionalWorld)+s('审美偏好与自我表达',d.data.aesthetics)+s('人际关系倾向',d.data.relationships)+s('职业与事业驱动力',d.data.career)+s('书影音品味评述',d.data.taste)+'</div>';
    show('✅ 分析完成！"'+d.type+' '+info.name+'" —— '+d.movies+' 部电影 + '+d.books+' 本书','ok');
  }catch(e){show('错误：'+e.message,'err');}
  loading=false;setBtn(false);
}
</script>
</body>
</html>
